<!DOCTYPE html>
<html>
<head>
    <title>Exam Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        {% if passed %}
        <div class="alert alert-success text-center">
            <h1>🎉 Congratulations! 🎉</h1>
            <p class="lead">You passed the exam!</p>
        </div>
        {% endif %}
        
        <div class="card">
            <div class="card-body">
                <h2>{{ submission.course.title }} - Results</h2>
                <h3>Score: {{ submission.score|floatformat:1 }}%</h3>
                <p>{{ correct_count }}/{{ total_questions }} correct answers</p>
                
                <a href="{% url 'course_detail' submission.course.id %}" class="btn btn-primary">Back to Course</a>
            </div>
        </div>
    </div>
</body>
</html>
